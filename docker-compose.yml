version: "3.8"

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - quant-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: --jetstream --store_dir /data --http_port 8222
    volumes:
      - nats-data:/data
    networks:
      - quant-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./deploy/prometheus/rules:/etc/prometheus/rules
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    networks:
      - quant-net
    depends_on:
      - engine-core

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - quant-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - ./deploy/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/observability/grafana:/var/lib/grafana/dashboards/quant
    networks:
      - quant-net

  engine-core:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/engine-core"]
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - quant-net
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  strategy-runner:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/strategy-runner"]
    ports:
      - "8081:8081"
    env_file:
      - .env
    networks:
      - quant-net
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  market-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/market-ingest"]
    ports:
      - "8082:8082"
    env_file:
      - .env
    networks:
      - quant-net
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/admin-api"]
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      STATIC_DIR: /app/web/dist
    networks:
      - quant-net
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  nats-data:

networks:
  quant-net:
    driver: bridge
