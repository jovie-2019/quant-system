x-proxy-env: &proxy-env
  ALL_PROXY: "socks5://host.docker.internal:7890"
  NO_PROXY: "localhost,127.0.0.1,nats,mysql,clickhouse,engine-core,strategy-runner,admin-api,market-ingest,market-ingest-okx,prometheus,alertmanager,grafana,loki,promtail"

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - quant-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: quant-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # native TCP (used by clickhouse-go)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: quant
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-quant}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-quant}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - quant-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: --jetstream --store_dir /data --http_port 8222 --client_advertise 127.0.0.1:4222
    volumes:
      - nats-data:/data
    networks:
      - quant-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./deploy/prometheus/rules:/etc/prometheus/rules
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    networks:
      - quant-net
    depends_on:
      - engine-core

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - quant-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - ./deploy/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/observability/grafana:/var/lib/grafana/dashboards/quant
    networks:
      - quant-net

  engine-core:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/engine-core"]
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      <<: *proxy-env
    networks:
      - quant-net
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Generic strategy-runner disabled. Each strategy runs in its own container.
  # Example: to run strategy config ID=1:
  #   strategy-momentum-btc:
  #     build: .
  #     entrypoint: ["/app/strategy-runner"]
  #     environment:
  #       STRATEGY_CONFIG_ID: "1"
  #       MYSQL_DSN: ${MYSQL_DSN}
  #       NATS_URL: ${NATS_URL}
  #     depends_on:
  #       mysql: { condition: service_healthy }
  #       nats: { condition: service_healthy }
  #     networks:
  #       - quant-net

  market-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/market-ingest"]
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      <<: *proxy-env
      BINANCE_WS_ENDPOINT: "wss://stream.binance.com:9443/ws"
    networks:
      - quant-net
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  market-ingest-okx:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/market-ingest"]
    ports:
      - "8083:8082"
    env_file:
      - .env
    environment:
      <<: *proxy-env
      INGEST_VENUE: "okx"
      INGEST_SYMBOLS: "BTC-USDT,ETH-USDT,SOL-USDT,BNB-USDT,XRP-USDT,DOGE-USDT,ADA-USDT,AVAX-USDT,LINK-USDT,DOT-USDT"
      OKX_WS_ENDPOINT: "wss://ws.okx.com:8443/ws/v5/public"
      INGEST_ADDR: ":8082"
    networks:
      - quant-net
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/admin-api"]
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      <<: *proxy-env
      STATIC_DIR: /app/web/dist
    networks:
      - quant-net
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - quant-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - ./deploy/loki/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - quant-net
    depends_on:
      - loki
    restart: unless-stopped

  # --- Data visualization tools ---
  phpmyadmin:
    image: phpmyadmin:5.2
    ports:
      - "8880:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - quant-net
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
  nats-data:
  loki-data:
  clickhouse-data:

networks:
  quant-net:
    driver: bridge
