kind: DaemonSet

serviceAccount:
  create: true

rbac:
  create: true

env:
  - name: SLS_HOST
    value: ""
  - name: SLS_URI
    value: "/logstores/quant-store/shards/lb"
  - name: SLS_PROJECT
    value: ""
  - name: SLS_LOGSTORE
    value: "quant-store"
  - name: SLS_AUTH
    value: ""

config:
  service: |
    [SERVICE]
        Flush           1
        Daemon          Off
        Log_Level       info
        Parsers_File    parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

  outputs: |
    [OUTPUT]
        Name            http
        Match           kube.*
        Host            ${SLS_HOST}
        Port            443
        URI             ${SLS_URI}
        Format          json_lines
        tls             On
        Header          Authorization ${SLS_AUTH}
        Header          x-log-apiversion 0.6.0
        Header          x-log-bodyrawsize 0
        compress        gzip
