apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy-runner
  namespace: quant-system
  labels:
    app: strategy-runner
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: strategy-runner
  template:
    metadata:
      labels:
        app: strategy-runner
    spec:
      containers:
        - name: strategy-runner
          image: quant-system/engine-core:latest
          imagePullPolicy: IfNotPresent
          command:
            - /app/strategy-runner
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: STRATEGY_RUNNER_ADDR
              value: ":8081"
            - name: STRATEGY_RUNNER_DURABLE
              value: "strategy-runner"
            - name: STRATEGY_RUNNER_SUBJECT
              value: "market.normalized.spot.>"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
