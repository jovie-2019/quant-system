apiVersion: v1
kind: Service
metadata:
  name: strategy-runner
  namespace: quant-system
  labels:
    app: strategy-runner
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8081"
spec:
  selector:
    app: strategy-runner
  ports:
    - name: http
      port: 8081
      targetPort: http
