global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: engine-core
    static_configs:
      - targets: ['engine-core:8080']
  - job_name: strategy-runner
    static_configs:
      - targets: ['strategy-runner:8081']
  - job_name: market-ingest
    static_configs:
      - targets: ['market-ingest:8082']
  - job_name: admin-api
    static_configs:
      - targets: ['admin-api:8090']
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
